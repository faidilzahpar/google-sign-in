<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sign-In</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #3b82f6;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .login-card { 
            background: var(--card); 
            padding: 2.5rem; 
            border-radius: 20px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); 
            width: 100%; 
            max-width: 380px; 
            text-align: center;
            border: 1px solid var(--border);
        }

        .subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }

        .google-btn-wrapper { margin: 1.5rem 0; display: flex; justify-content: center; }

        .divider { border: 0; height: 1px; background: var(--border); margin: 1.5rem 0; }

        /* Styling untuk ID hasil-login */
        #hasil-login { min-height: 50px; font-size: 0.9rem; }

        /* Gaya saat sudah login */
        .profile-box { text-align: left; animation: fadeIn 0.5s ease-out; }
        .status-badge { background: rgba(74, 222, 128, 0.1); color: #4ade80; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; display: inline-block; margin-bottom: 1rem; }
        .info-label { color: #64748b; font-size: 0.8rem; margin-bottom: 2px; }
        .info-value { margin-bottom: 12px; font-weight: 500; font-size: 0.95rem; }
        
        .btn-logout { 
            background-color: #f87171; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            margin-top: 10px; 
            width: 100%; 
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn-logout:hover { opacity: 0.8; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="login-card">
        
        <div id="g_id_onload"
             data-client_id="291976057261-j0b4vmupoq9i6e926scpfeauqt15lk40.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleGoogleLogin"
             data-auto_prompt="false">
        </div>
        
        <div class="google-btn-wrapper" id="btn-google-container">
            <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_black" data-size="large"></div>
        </div>

        <hr class="divider">
        
        <div id="hasil-login">
            <i>Menunggu autentikasi...</i>
        </div>
    </div>

    <script type="module" src="croot.js"></script>
</body>
</html>
